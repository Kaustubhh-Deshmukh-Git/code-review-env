version: "1.0"
name: "code-review"
description: "Code Review OpenEnv - Train AI agents to review code"

action_schema:
  type: object
  properties:
    action_type:
      type: string
      enum:
        - "report_bug"
        - "request_change"
        - "approve"
        - "skip_line"
    line_number:
      type: integer
    bug_description:
      type: string
    severity:
      type: string
      enum:
        - "critical"
        - "high"
        - "medium"
        - "low"
    suggestion:
      type: string
  required:
    - "action_type"

observation_schema:
  type: object
  properties:
    code_lines:
      type: array
    current_line:
      type: integer
    bugs_found_so_far:
      type: object
    available_actions:
      type: array
    episode_progress:
      type: number
    task_type:
      type: string
    code_summary:
      type: string

reward_schema:
  type: object
  properties:
    score:
      type: number
    partial_progress:
      type: number
    done:
      type: boolean
    info:
      type: object

tasks:
  - id: "easy"
    name: "Syntax Error Detection"
    description: "Detect syntax errors in Python code"

  - id: "medium"
    name: "Style & Performance Review"
    description: "Identify style and performance issues"

  - id: "hard"
    name: "Security Vulnerability Detection"
    description: "Find security vulnerabilities"